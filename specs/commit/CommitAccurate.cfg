\* @spec    specs/commit/CommitProtocol.tla
\* @expect  NONE
\*
\* Spec A — the ACCURATE-mode verification: no under-declaration anywhere, so
\* Contract C is in full force and the footprint relation is the whole defence.
\*
\* Scenario:
\*   h5a, h5b — THE H5 IDIOM: read the whole map, then insert a fresh key.
\*              Before the H5 fix these were judged COMPATIBLE (the parent rule
\*              never tested a child WRITE against a parent READ), they
\*              overlapped, both observed the pre-insert map, and both
\*              committed — phantom write skew on fully accurate footprints.
\*              Post-fix the relation's THIRD CONJUNCT makes them incompatible,
\*              Contract C serializes them, and CommitSnapshotValid HOLDS.
\*              This is the H5 fix's independent, MODEL-SIDE confirmation: the
\*              behavioural evidence was the oracle test (~98% of contended
\*              reps non-serializable pre-fix); this is the same conclusion
\*              reached from the commit protocol instead of from the relation.
\*              Negative control NC-3 removes the third conjunct and this
\*              config goes red — proving the check is load-bearing.
\*   h3a, h3b — the write-skew pair with ACCURATE footprints. Raw-id overlap
\*              (each writes what the other reads) makes them incompatible, so
\*              Contract C serializes them and no skew arises. The control for
\*              CommitH3.cfg: the anomaly there is caused by the fallback, not
\*              by the commit protocol's structure.
\*   ro       — a pure reader of x. Makes NoLocksWithoutWrites non-trivial (a
\*              read-only log resolves ZERO locks — the TxnLogRetry vacuity
\*              pin), and it is incompatible with h3b, so its read is
\*              protected too.
\*
\* Verifies with deadlock detection ON (legitimate terminals stutter via
\* Terminating). Note what this does NOT say: H2 is reachable on accurate
\* footprints too — it just needs two MAPS, which this config does not give the
\* transactions in a conflicting order. CommitH2.cfg is where that lives.
CONSTANT
    NoParent = NoParent
    Txns = {"h5a", "h5b", "h3a", "h3b", "ro"}
    UnderDeclared = {}
    MaxInc = 1
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT ContractCHolds
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT CommitSnapshotValid
INVARIANT BoundsNeverBind
INVARIANT CoverageSubsumesDirty
