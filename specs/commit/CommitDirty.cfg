\* Spec A — the dirty-resubmission path, and the CONTRAST CASE for H3.
\*
\* Scenario: wwa and wwb both WRITE x, and both are under-declared (empty
\* footprint) — the same static-analysis fallback that H3 exploits. Contract C
\* therefore lets them overlap, exactly as in CommitH3.cfg.
\*
\* But here the fallback is CAUGHT. The conflict lands on the WRITE set, and
\* the write set is the one thing the commit protocol does defend: both
\* transactions resolve x's commitLock, so they serialize; the loser's dirty
\* check (isDirty compares live against its snapshot) sees x has moved, it
\* releases, refines its declared footprint from the ACTUAL log
\* (freshIncarnation(refinement.getValidated) -> submitTxnForImmediateRetry),
\* and re-runs — now with an accurate footprint, so Contract C serializes it.
\*
\* EXPECTED CLEAN. The pair (this config, CommitH3.cfg) is the precise
\* statement of the fallback's soundness boundary: under-declaration is safe
\* for write-write conflicts and UNSAFE for read-write ones. That asymmetry is
\* not incidental — it is exactly the shape of the central design fact
\* (read-only entries are never commit-validated and hold no locks), so any
\* fix for H3 must target the read side.
\*
\* Also the only config that exercises DirtyRestart, so it is what keeps the
\* refinement path honest; BoundsNeverBind confirms MaxInc never binds.
CONSTANT
    NoParent = NoParent
    Txns = {"wwa", "wwb"}
    UnderDeclared = {"wwa", "wwb"}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT CommitSnapshotValid
INVARIANT BoundsNeverBind
