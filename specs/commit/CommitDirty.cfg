\* Spec A — the refinement path (release, re-declare from the log, re-run), as it
\* stands after the H3 and H6 fixes. EXPECTED CLEAN.
\*
\* This config had to be REWRITTEN when the H3 fix landed, and why is the most
\* important thing on this page.
\*
\* IT USED TO BE: wwa and wwb, two UNDER-DECLARED transactions both writing x.
\* The fallback was CAUGHT there — the conflict lands on the write set, which the
\* commit locks and the dirty check do cover — so the loser went dirty, refined
\* its footprint from the actual log and re-ran. That was the contrast case that
\* made H3's boundary precise.
\*
\* THE H3 FIX MAKES THAT SCENARIO UNREACHABLE. An under-approximated footprint is
\* now incompatible with everything, so wwa and wwb can no longer overlap, neither
\* sees the other's write, and neither ever goes dirty. The old config would still
\* have passed — VACUOUSLY. Negative control NC-2 predicted exactly this before
\* the fix was written: on the OLD wwa/wwb config, DirtyRestart fired twice at
\* baseline and ZERO times under NC-2. Shipping it unchanged would have left a
\* green check that verified nothing.
\*
\* SO WHAT CAN STILL REFINE? Only a transaction whose DECLARED footprint diverges
\* from its ACTUAL one WITHOUT the analyser throwing — because a throw is now
\* flagged, and a flagged transaction runs alone, so nothing can move underneath
\* it and it is never dirty. That is `ddw`: it declares a write to y but really
\* writes x — DATA-DEPENDENT footprint divergence, where a key or target was
\* computed from a value read BEFORE the transaction was submitted and then
\* changed underneath it. Its analysis COMPLETED, so it is not flagged and the
\* scheduler trusts it.
\*
\* Scenario: ddw (declares w y, really writes x) against wwa (declares and writes
\* x, accurately). Their DECLARED footprints look disjoint, so Contract C lets
\* them overlap, and both really write x.
\*
\* WHAT ACTUALLY RESTARTS ddw IS THE COVERAGE CHECK, NOT THE DIRTY CHECK — and the
\* difference is easy to miss, because the scenario LOOKS like a race and is not
\* one. A declared write to y does not cover a real write to x, so Covers is FALSE
\* at incarnation 0 in EVERY interleaving: contended or not, whether or not wwa
\* reached x first, whether or not the dirty check would have noticed anything.
\* ddw releases without publishing, refines from the ACTUAL log (complete by
\* construction, hence not flagged) and re-runs. The refined footprint conflicts
\* with wwa's honestly, so Contract C serializes the pair from then on. There is
\* no "loser of a race" here; the divergence is caught by self-inspection.
\*
\* EXPECTED CLEAN, and the refinement path is reachable and fires. Be precise
\* about which trigger fires it, because that question used to be unanswerable.
\*
\* Since the H6 fix there are TWO ways to reach a refinement, and they used to
\* share ONE action guarded by NeedsRefinement = IsDirty \/ ~CoverageOk. TLC's
\* action coverage could not tell them apart, so "DirtyRestart fires" was the
\* stated non-vacuity evidence for this config while proving nothing about the
\* dirty check: delete the IsDirty disjunct entirely and DirtyRestart still fired,
\* and the config still verified clean. The check had quietly become untested.
\*
\* The action is now SPLIT on disjoint guards (DirtyRestart on IsDirty,
\* CoverageRestart on ~IsDirty /\ ~CoverageOk). Their disjunction is exactly
\* NeedsRefinement, so the reachable state space is unchanged — 121 distinct
\* states either way — but each transition is now attributed to its CAUSE.
\* Measured here (-coverage 1 -workers 1):
\*
\*     DirtyRestart      0:1     <- one transition, ZERO new states
\*     CoverageRestart   2:7
\*
\* AND THE SPLIT IMMEDIATELY FOUND SOMETHING, WHICH IS THE POINT OF BUILDING IT.
\* DirtyRestart is 0:0 in EVERY other commit config (H2, H3, H3Partial, H3Writer,
\* H6, Accurate). Across the whole of Spec A the commit-time dirty check causes
\* ONE transition and NO new states.
\*
\* It is not merely under-exercised, it is UNPINNED: set IsDirty(t) == FALSE — 
\* delete the check outright — and all SEVEN configs still verify CLEAN. Spec A
\* does not check the dirty check.
\*
\* There is an honest reading in which that is CORRECT rather than a gap, and the
\* model cannot tell us which. Contract C keeps footprint-incompatible peers out
\* of overlapping windows, so an ACCURATELY declared transaction can never have
\* its write set moved underneath it. The only transaction that can is one whose
\* declared footprint diverged — and since the H6 fix, COVERAGE catches that one
\* first and aborts it BEFORE the publish, so the publish that would have made a
\* peer dirty never happens. On that reading the dirty check has been subsumed.
\*
\* The alternative reading is that the catalogue is simply too small to isolate
\* it. Two entities and five transactions is not much.
\*
\* DO NOT DELETE THE CHECK ON THE STRENGTH OF THIS. Resolving it needs either a
\* scenario that drives the dirty path with coverage satisfied, or an argument
\* that no such scenario exists. Until then this is a documented gap, not a
\* verified redundancy — and it is recorded here rather than left to be
\* rediscovered.
\* So "DirtyRestart fires" NO LONGER IMPLIES "the dirty check fired". Delete
\* IsDirty entirely and this config still passes with the action still firing;
\* the dirty check's own contribution at baseline is a margin of ONE transition.
\* The dirty path is exercised here, but this config is a weak witness for it,
\* and it would not notice if the dirty check were quietly broken. Distinguishing
\* the two triggers needs a ghost, which would be a change to the spec rather
\* than to this comment.
\*
\* Read this config also as a statement of what FLAGGING does not cover, since
\* that is what forced the coverage check into existence. An inaccurate declared
\* footprint is an inaccurate declared footprint, whether it got that way by
\* throwing or by racing — and flagging cannot reach the racing kind, because
\* nothing threw. CommitH6.cfg is where the read-side consequence is checked;
\* here neither transaction reads anything, so CommitSnapshotValid is listed
\* below but VACUOUS, and the invariants doing real work are the lock and
\* refinement ones.
CONSTANT
    NoParent = NoParent
    Txns = {"ddw", "wwa"}
    UnderDeclared = {}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT CommitSnapshotValid
INVARIANT BoundsNeverBind
