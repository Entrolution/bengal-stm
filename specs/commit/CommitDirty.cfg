\* Spec A — the dirty-resubmission path, POST-H3-FIX.
\*
\* This config had to be REWRITTEN when the H3 fix landed, and why is the most
\* important thing on this page.
\*
\* IT USED TO BE: wwa and wwb, two UNDER-DECLARED transactions both writing x.
\* The fallback was CAUGHT there — the conflict lands on the write set, which the
\* commit locks and the dirty check do cover — so the loser went dirty, refined
\* its footprint from the actual log and re-ran. That was the contrast case that
\* made H3's boundary precise.
\*
\* THE H3 FIX MAKES THAT SCENARIO UNREACHABLE. An under-approximated footprint is
\* now incompatible with everything, so wwa and wwb can no longer overlap, neither
\* sees the other's write, and neither ever goes dirty. The old config would still
\* have passed — VACUOUSLY. Negative control NC-2 predicted exactly this before
\* the fix was written (TLC action coverage: DirtyRestart fires 2x at baseline,
\* 0x under NC-2), and shipping it unchanged would have left a green check that
\* verified nothing.
\*
\* SO WHAT CAN STILL GO DIRTY? Only a transaction whose DECLARED footprint
\* diverges from its ACTUAL one WITHOUT the analyser throwing — because a throw is
\* now flagged and serialized. That is `ddw`: it declares a write to y but really
\* writes x, modelling the DATA-DEPENDENT footprint divergence recorded in
\* docs/plans/formal-specs.md section 10 — a key or target computed from a value
\* read BEFORE the transaction was submitted, which then changed underneath it.
\* Its analysis COMPLETED, so it is not flagged and the scheduler trusts it.
\*
\* Scenario: ddw (declares w y, really writes x) against wwa (declares and writes
\* x, accurately). Their DECLARED footprints look disjoint, so Contract C lets
\* them overlap; both then really write x, so they serialize on x's commitLock and
\* the loser's dirty check sees x has moved. It releases, refines its footprint
\* from the ACTUAL log — complete by construction, hence NOT flagged — and re-runs
\* at full concurrency. That is why the H3 fix's serialization cost is paid once
\* rather than forever.
\*
\* EXPECTED CLEAN, and NOT vacuously: DirtyRestart is reachable and fires.
\*
\* Read this config also as a statement of what the H3 fix does NOT cover. The
\* dirty machinery now exists to service exactly one path — data-dependent
\* divergence — and that path is unsound in its own right for READS, by precisely
\* the H3 argument: an inaccurate declared footprint is an inaccurate declared
\* footprint, whether it got that way by throwing or by racing. Flagging cannot
\* reach it, because nothing threw. It is the natural next hypothesis.
CONSTANT
    NoParent = NoParent
    Txns = {"ddw", "wwa"}
    UnderDeclared = {}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT CommitSnapshotValid
INVARIANT BoundsNeverBind
