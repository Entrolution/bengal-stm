\* @spec    specs/commit/CommitProtocol.tla
\* @expect  NONE
\*
\* Spec A — H2: lock ordering across two maps. Verifies since the H2 fix.
\*
\* Scenario:
\*   h2a, h2b — each inserts a fresh key into BOTH maps. Their declared
\*              footprints are ACCURATE (UnderDeclared is empty): this defect
\*              needed no fallback, no under-declaration and no scheduler bug.
\*              It was reachable on correct footprints.
\*
\*              Compatibility is COMPUTED by common/Footprint.tla, never
\*              hand-assigned: the two update sets are disjoint entry ids,
\*              neither side writes or reads a structure id, so all three
\*              conjuncts pass and Contract C lets them overlap (the lemma table
\*              pins this as DocumentsSiblingInsertsCompatible). Both then hold
\*              {LM1, LM2} — every new-key entry falls back to its MAP's
\*              commitLock.
\*
\*              PRE-FIX, withLock sorted the LOG ENTRIES, whose keys are hashed
\*              from (mapId, key) and bear no relation to the locks they resolve
\*              to. The pinned ordering (M1a=11 < M2a=12; M2b=13 < M1b=14) made
\*              h2a take LM1 then LM2 while h2b took LM2 then LM1: a circular
\*              wait, both fibers blocked forever on Semaphore.permit, both
\*              callers hung on completionSignal.get. TLC found it as a 17-state
\*              NoWaitsForCycle counterexample; the behavioural twin deadlocked
\*              and timed out (CommitLockOrderSpec).
\*
\*              POST-FIX, TxnLogEntry.lock carries each lock's OWNER id and
\*              withLock sorts on that. Owner -> lock is injective, so one
\*              ascending order is a global total order over locks and no cycle
\*              can form. Both transactions now take LM1 then LM2.
\*
\*   dbl      — inserts TWO fresh keys into ONE map. Both entries alias to that
\*              map's single structural commitLock, so withLock's `.distinct`
\*              must collapse them into ONE acquisition: a 1-permit Semaphore
\*              taken twice by the same fiber self-deadlocks. Nothing else in
\*              the catalogue exercises the dedup, and the H2 fix changed what
\*              it dedupes on (the (owner id, Semaphore) pair rather than the
\*              bare Semaphore), so it needs its own pin.
\*
\* Exhaustive, with deadlock detection ON. Two negative controls
\* keep this honest (both in specs/README.md): NC-1 reverts the sort key to the
\* log key and NoWaitsForCycle goes red; NC-5 removes the `.distinct` and `dbl`
\* self-deadlocks. Both still reproduce their counterexamples, which is what
\* entitles the green verdict here to mean anything.
CONSTANT
    NoParent = NoParent
    Txns = {"h2a", "h2b", "dbl"}
    UnderDeclared = {}
    MaxInc = 1
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT ContractCHolds
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT CommitSnapshotValid
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
