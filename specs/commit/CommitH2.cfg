\* Spec A — H2: lock-order inversion via the map-lock fallback.
\*
\* Scenario: h2a inserts a fresh key into BOTH maps; h2b inserts a different
\* fresh key into both. Their declared footprints are ACCURATE (UnderDeclared
\* is empty) — this defect needs no fallback, no under-declaration, and no
\* scheduler bug. It is reachable on correct footprints.
\*
\* Compatibility is COMPUTED by common/Footprint.tla, never hand-assigned:
\* the two update sets are disjoint entry ids, neither side writes or reads a
\* structure id, so all three conjuncts pass and Contract C lets them overlap
\* (the lemma table pins this as DocumentsSiblingInsertsCompatible).
\*
\* Both then hold {LM1, LM2} — every new-key entry falls back to its MAP's
\* commitLock — and withLock sorts by the ENTRY's hash-derived id, which bears
\* no relation to the lock it resolves to. The pinned ordering
\* (M1a=11 < M2a=12; M2b=13 < M1b=14) makes h2a take LM1 then LM2 and h2b take
\* LM2 then LM1.
\*
\* EXPECTED RED: NoWaitsForCycle. Two maps and two transactions are minimal —
\* see the bounds argument in the spec header.
CONSTANT
    NoParent = NoParent
    Txns = {"h2a", "h2b"}
    UnderDeclared = {}
    MaxInc = 1
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT LocksHeldConsistent
INVARIANT ContractCHolds
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT CommitSnapshotValid
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
