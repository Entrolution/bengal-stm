\* Spec A — H3 AS ORDINARY CODE ACTUALLY REACHES IT.
\* EXPECTED CLEAN SINCE THE H3 FIX.
\*
\* CommitH3.cfg models the EXTREME point of the under-approximation class: an
\* EMPTY declared footprint, from TxnRuntime.commit's `case _ =>
\* IdFootprint.empty` branch. That branch is real, but it is NOT the one the
\* demonstrated defect takes.
\*
\* The reachable path takes the OTHER branch. Trace it:
\*
\*   scratch.set(k, 1)      -- analyser: addWriteId(existential(scratch, k))
\*   scratch.get(k)         -- analyser: addReadId(same id); reads LIVE state,
\*                             which is None, because the analyser never
\*                             APPLIED the write it just recorded
\*   STM[F].delay(ov.get)   -- TxnDelay whose thunk throws on that None. Its
\*                             handler converts the throw into
\*                             StaticAnalysisShortCircuitException(s), carrying
\*                             the PARTIAL footprint accumulated so far
\*   ...rest of the txn...  -- NEVER ANALYSED
\*
\* TxnRuntime.commit then takes its FIRST handleErrorWith branch and schedules
\* on that partial footprint — which, after getValidated drops the read that is
\* also a write, is exactly {updates: {existential(scratch, k)}}.
\*
\* So pfa/pfb are NOT in UnderDeclared. Their under-approximation comes from
\* StaticFP, and it is a genuine partial footprint, not an idealised empty one.
\*
\* PRE-FIX, THAT SIZE DIFFERENCE BOUGHT NOTHING, which was the point. The two
\* partial footprints name DISJOINT scratch keys, so they computed compatible,
\* and the scheduler ran them concurrently — exactly as if they had declared
\* nothing at all. Both scratch inserts are fresh keys in the SAME map, so both
\* resolved that map's structural commitLock via the H2 new-key fallback and
\* genuinely serialized on it — and the skew happened anyway, because it is on x
\* and y, which neither transaction locked or validated. This config existed to
\* show that the scratch map was not what caused the anomaly, and that
\* under-approximation is unsound whatever its SIZE: what matters is that the
\* conflicting ids are missing.
\*
\* POST-FIX, SIZE STILL BUYS NOTHING — and now that cuts the other way. What
\* TxnRuntime.commit hands the scheduler is the partial footprint MARKED
\* (.markUnderApproximated), so StaticFP gives pfa FPU({}, {M1a}), not
\* FP({}, {M1a}). The flag, not the content, is what the relation reads: a
\* flagged footprint is incompatible with everything, so these two never compute
\* compatible and never overlap. They no longer contend on the map's commitLock
\* either — Contract C separated them long before withLock. The skew cannot
\* happen, and CommitSnapshotValid HOLDS.
\*
\* EXPECTED CLEAN — the same verdict as CommitH3.cfg, reached by the same
\* mechanism, now on the footprint the real code actually produces rather than
\* on the worst-case idealisation. That the two agree is the point of running
\* both: the fix keys on the flag, so it cannot care how much of the footprint
\* survived the throw. The behavioural twin is StaticAnalysisFallbackSpec, which
\* reproduced the defect at 198/200 contended reps and is now a regression test.
CONSTANT
    NoParent = NoParent
    Txns = {"pfa", "pfb"}
    UnderDeclared = {}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
