\* @spec    specs/commit/CommitProtocol.tla
\* @expect  NONE
\*
\* Spec A — H6: DATA-DEPENDENT FOOTPRINT DIVERGENCE.
\* Verifies since the H6 fix (the commit-time coverage check).
\*
\* The hole the H3 fix could not reach — it was the last one standing, and it is
\* the reason the commit protocol now checks its own footprint.
\*
\* staticAnalysisCompiler runs in TxnRuntime.commit BEFORE submitTxn — outside
\* activeTransactions, outside any Contract-C window — and it computes the access
\* set by executing LIVE READS. So a transaction whose keys or targets depend on a
\* value it read can be scheduled on a footprint that names THE WRONG IDS:
\*
\*     for { k <- keyVar.get          \* analysis reads keyVar = "a"
\*           _ <- myMap.set(k, 1) }   \* so it DECLARES a write to entry (myMap,"a")
\*
\* Another transaction commits keyVar := "b" in the gap between the analysis and
\* the scheduling window. The real log run — now inside the window — reads "b" and
\* writes entry (myMap,"b"), an id the scheduler never knew about.
\*
\* NOTHING THREW. The walker completed, so the footprint is not flagged, and the
\* H3 fix does not apply. The scheduler trusts a footprint that is simply wrong.
\*
\* Scenario: ddw declares a write to y but really writes x (StaticFP vs ActualFP).
\* ro reads x, accurately declared. Their DECLARED footprints are disjoint, so
\* Contract C still lets them overlap — and it is right to, because it has no
\* evidence of a conflict. PRE-FIX, ddw then published x underneath ro's read;
\* ro holds no lock on x and never validates it (read-only entries are never
\* commit-validated), so it committed on a value that no longer existed.
\*
\* THE FIX, and note WHERE it has to sit. Nothing before the commit can catch
\* this: the scheduler has already been lied to, and it cannot know. So the
\* transaction checks ITSELF, under the locks, at the last moment it still can —
\* does my DECLARED footprint COVER what my log actually touched? A declared
\* write to y does not cover a real write to x, so ddw fails the check and
\* ABORTS WITHOUT PUBLISHING. That ordering is the whole fix: the unannounced
\* write never lands, so ro's unvalidated read of x stays valid, and ro is never
\* even aware there was a race. ddw then refines from its actual log and re-runs
\* — and the refined footprint conflicts with ro's honestly, so Contract C
\* serializes the pair on the second attempt. CommitSnapshotValid HOLDS.
\*
\* Aborting before the publish, rather than detecting after it, is what makes the
\* check work in both directions: our undeclared write never becomes visible, and
\* our own undeclared read never reaches a caller.
\*
\* Negative control NC-6 (specs/README.md) removes the coverage check and this
\* config goes red again; NC-7 breaks Covers so that a declared write "covers" a
\* sibling entry — H6's exact mechanism — and LemmaCoverageIsSound fails.
CONSTANT
    NoParent = NoParent
    Txns = {"ddw", "ro"}
    UnderDeclared = {}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
