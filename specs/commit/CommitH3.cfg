\* Spec A — H3: write skew when the static-analysis fallback under-declares.
\* EXPECTED CLEAN SINCE THE H3 FIX.
\*
\* Scenario: h3a does `r x, w y`; h3b does `r y, w x`. Both are in
\* UnderDeclared — modelling TxnRuntime.commit's handleErrorWith, which falls
\* back when the static-analysis walker throws ("blindly optimistic scheduling
\* for the first transaction attempt").
\*
\* THE DEFECT, as this config reproduced it. The fallback produced
\* IdFootprint.empty. An empty footprint is compatible with everything, so
\* Contract C's guard evaporated and both ran concurrently. Neither was DIRTY at
\* commit — the dirty check validates the WRITE SET only, and their write sets
\* are disjoint. Neither held a read lock — read-only entries return lock = None.
\* So both published, each having read a value the other had since overwritten.
\* No serial order produces that history.
\*
\* THE FIX, and where it lands. The fallback footprint is now FLAGGED
\* (IdFootprint.markUnderApproximated), and the relation makes a flagged
\* footprint incompatible with EVERY footprint — the empty one, a pure reader,
\* itself. "I do not know what I touch" stopped being read as "I touch nothing".
\* So the guard does not evaporate: it tightens to TOTAL SERIALIZATION. h3a and
\* h3b never overlap, neither can read a value the other later overwrites, and
\* CommitSnapshotValid HOLDS.
\*
\* The serialization shows up in the model's SHAPE, not only its verdict. With
\* the two transactions unable to interleave, TxnEnter and Publish have exactly
\* four transitions each (two orderings, two transactions) and DirtyRestart has
\* ZERO. A flagged transaction runs alone, so nothing can move underneath it, so
\* it is never dirty; and the coverage check skips it, because a footprint that
\* describes nothing covers nothing. It runs once, alone, and commits — it never
\* refines, and the serialization is the whole price of the fix.
\*
\* This was always a SOUNDNESS BOUNDARY rather than an optimisation detail. The
\* scheduler's footprint conflict-avoidance is the ONLY defence against stale
\* reads — the commit protocol has no read validation and no read locks — so an
\* under-approximated footprint switched that defence off entirely. Negative
\* control NC-2 (specs/README.md) drops the flag clause from IsCompatible and
\* this config goes red again.
CONSTANT
    NoParent = NoParent
    Txns = {"h3a", "h3b"}
    UnderDeclared = {"h3a", "h3b"}
    MaxInc = 1
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
