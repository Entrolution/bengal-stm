\* Spec A — H3: write skew when the static-analysis fallback under-declares.
\*
\* Scenario: h3a does `r x, w y`; h3b does `r y, w x`. Both are in
\* UnderDeclared — modelling TxnRuntime.commit's handleErrorWith, which falls
\* back to IdFootprint.empty when the static-analysis walker throws ("blindly
\* optimistic scheduling for the first transaction attempt").
\*
\* An empty footprint is compatible with everything, so Contract C's guard
\* evaporates and both run concurrently. Neither is DIRTY at commit — the
\* dirty check validates the WRITE SET only, and their write sets are
\* disjoint. Neither takes a read lock — read-only entries return lock = None.
\* So both publish, each having read a value the other has since overwritten.
\* No serial order produces that.
\*
\* EXPECTED RED: CommitSnapshotValid.
\*
\* This is a SOUNDNESS BOUNDARY, not an optimisation detail: the scheduler's
\* footprint conflict-avoidance is the ONLY defence against stale reads (the
\* commit protocol has no read validation and no read locks), so an
\* under-approximated footprint switches that defence off entirely. Contrast
\* CommitDirty.cfg, where the same fallback is CAUGHT — because there the
\* conflict lands on the write set, which the locks and the dirty check do
\* cover.
CONSTANT
    NoParent = NoParent
    Txns = {"h3a", "h3b"}
    UnderDeclared = {"h3a", "h3b"}
    MaxInc = 1
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
