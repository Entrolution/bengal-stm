\* @spec    specs/commit/CommitProtocol.tla
\* @expect  NONE
\*
\* Spec A — H3, second direction: an UNDER-DECLARED WRITE against an
\* ACCURATELY-DECLARED READ. Verifies since the H3 fix.
\*
\* Scenario: wwa writes x and is under-declared. h3a reads x and writes y, and
\* declares both accurately.
\*
\* THE DEFECT. The fallback footprint was EMPTY, hence compatible with
\* everything, so Contract C let them overlap — and then: h3a reads x, wwa
\* publishes x, h3a publishes y on the strength of the x it read. h3a's dirty
\* check never looks at x, because x is a READ for h3a and the dirty check
\* validates the write set only. h3a holds no lock on x either, because
\* read-only entries return lock = None. TLC found it as a CommitSnapshotValid
\* counterexample.
\*
\* THE FIX. wwa's footprint is now FLAGGED rather than empty, and a flagged
\* footprint is incompatible with everything, so wwa is serialized against h3a
\* and the overlap that carried the anomaly cannot occur. CommitSnapshotValid
\* HOLDS.
\*
\* WHY THIS CONFIG EXISTS — and it is the one that decided the SHAPE of the fix.
\* A cheaper fix suggests itself: the write set is the part the commit locks and
\* the dirty check already cover, so flag only under-declared READS and leave
\* under-declared writes to the existing machinery. THIS CONFIG REFUTES THAT.
\* The under-declared transaction here has NO READS AT ALL, and it still breaks
\* a correctly-declared peer, because the damage is done to the OTHER
\* transaction's reads. Under-declaring a WRITE is not a lesser sin; it is the
\* same sin, committed against someone else.
\*
\* So the fallback would be safe only if NEITHER party read anything, which is
\* almost never. Any under-approximation, of reads or of writes, has to be
\* treated as unreliable — which is what makes the blunt fix (a flagged
\* footprint is incompatible with everything) the right shape rather than an
\* over-reaction. Negative control NC-2 (specs/README.md) reverts it and this
\* config goes red again.
CONSTANT
    NoParent = NoParent
    Txns = {"wwa", "h3a"}
    UnderDeclared = {"wwa"}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
INVARIANT CoverageSubsumesDirty
