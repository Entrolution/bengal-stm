\* Spec A — H3, second direction: an UNDER-DECLARED WRITE against an
\* ACCURATELY-DECLARED READ.
\*
\* Scenario: wwa writes x and is under-declared (empty footprint). h3a reads x
\* and writes y, and declares both accurately. Contract C lets them overlap —
\* an empty footprint is compatible with everything — and then:
\*
\*   h3a reads x, wwa publishes x, h3a publishes y on the strength of the x it
\*   read. h3a's dirty check never looks at x, because x is a READ for h3a and
\*   the dirty check validates the write set only. h3a holds no lock on x
\*   either, because read-only entries return lock = None.
\*
\* EXPECTED RED: CommitSnapshotValid.
\*
\* WHY THIS CONFIG EXISTS. It refutes a tempting and WRONG refinement of the
\* H3 fix. CommitDirty.cfg shows the fallback being CAUGHT when two
\* under-declared transactions collide on the WRITE set, which invites the
\* conclusion that only under-declared READS are dangerous and that a cheaper
\* fix could flag just those. Not so: the under-declared transaction here has
\* NO READS AT ALL, and it still breaks a correctly-declared peer. The damage
\* is done to the OTHER transaction's reads.
\*
\* So the fallback is safe only when NEITHER party reads anything — which is
\* almost never. Any under-approximation, of reads or of writes, must be
\* treated as unreliable. That is what makes the blunt fix (an under-declared
\* footprint is incompatible with everything) the right shape rather than an
\* over-reaction.
CONSTANT
    NoParent = NoParent
    Txns = {"wwa", "h3a"}
    UnderDeclared = {"wwa"}
    MaxInc = 2
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT ContractCHolds
INVARIANT LocksHeldConsistent
INVARIANT LockOwnerStable
INVARIANT NoLocksWithoutWrites
INVARIANT PublishedExactlyOnce
INVARIANT NoWaitsForCycle
INVARIANT BoundsNeverBind
INVARIANT CommitSnapshotValid
