\* Spec B — the park-time staleness check against an UNLOGGED read.
\*
\* tm is tr with EXACTLY ONE DIFFERENCE: its read of V1 records no log entry
\* (LoggedFP). That is what a waitFor on an ABSENT MAP KEY does — the
\* key-absent branch of TxnLogContext.getVarMapValue returns the log
\* unchanged, so anyReadChangedSinceRead, which folds over log.values, cannot
\* see the read at all.
\*
\* Everything else is held fixed: tm DECLARES the read (the walker registers
\* the key's existential id whether or not the key exists), so Contract C and
\* the wake sweep both still match on it, and the activeTransactions scan —
\* H1's FIRST park guard — still works. Only the SECOND guard is blind.
\*
\* Compare SchedulerRetry.cfg, which is {tr, tw} and verifies CLEAN. Any
\* violation here is therefore caused by the missing log entry and nothing
\* else: same protocol, same predicate, same write set, one absent entry.
\*
\* EXPECTED RED: deadlock. The H1 soundness argument needs both guards — the
\* scan catches conflictors still running, the staleness check catches those
\* that already committed and left. With the second one structurally dead, a
\* conflictor that completes inside the parker's [registerCompletion -> scan]
\* gap escapes both, and nothing ever wakes the parker.
CONSTANT
    NoParent = NoParent
    Txns = {"tm", "tw"}
    MaxInc = 2
    MaxVer = 6
    AbortsEnabled = FALSE
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT TallyNonNegative
INVARIANT ContractC
INVARIANT NoDoubleExec
INVARIANT NoExecOnCompleted
INVARIANT CompletionAtMostOnce
INVARIANT NoDoublePublish
INVARIANT NoDroppedSpawn
INVARIANT BoundsNeverBind
