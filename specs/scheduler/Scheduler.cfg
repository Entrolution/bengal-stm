\* Spec B verification config, ORGANIC protocol (no failure injection).
\*
\* EXPECTED CLEAN since the H4 fix (admission gate + fresh incarnations +
\* exactly-once cascades): all six safety invariants hold, the two-slot
\* fiber bound drops nothing (NoDroppedSpawn), and TLC's deadlock detection
\* runs ENABLED (no -deadlock flag — legitimate terminals stutter via
\* Terminating), so a reported deadlock would be a real protocol deadlock.
\* Exhaustive at these bounds, and MEASURED rather than remembered: 3,775,555
\* states generated, 845,687 distinct, search depth 85, queue drained. Those
\* counts are the pin. Wall clock is a couple of minutes on a developer machine,
\* but it is machine-dependent and pinning it is how the last figure here rotted.
\*
\* Historical note: before the fix this config's scenario produced the H4
\* counterexample family — NoDoubleExec at TLC search depth ~50, then
\* ContractC/NoExecOnCompleted/NoDoublePublish/TallyNonNegative/
\* CompletionAtMostOnce at depths 51-64 (see specs/README.md verdicts).
CONSTANT
    NoParent = NoParent
    Txns = {"t1", "t2", "t3"}
    MaxInc = 2
    MaxVer = 6
    AbortsEnabled = FALSE
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT TallyNonNegative
INVARIANT ContractC
INVARIANT NoDoubleExec
INVARIANT NoExecOnCompleted
INVARIANT CompletionAtMostOnce
INVARIANT NoDoublePublish
INVARIANT NoDroppedSpawn
INVARIANT BoundsNeverBind
