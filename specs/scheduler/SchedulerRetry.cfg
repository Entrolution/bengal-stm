\* @spec    specs/scheduler/Scheduler.tla
\* @expect  NONE
\*
\* Spec B retry/park/wake config (Phase 2): tr is a waitFor transaction
\* (reads V1, retries until version[V1] >= 1, then writes V2); tw writes V1.
\* Deadlock detection ON (no ALLOW_DEADLOCK): a parked-forever transaction
\* is a dead-end state — H1's lost-wakeup manifests as a hard deadlock, not
\* a fairness lasso.
\*
\* Verifies since the H1 fix: submitTxnForRetry re-checks the read
\* set (anyReadChangedSinceRead) and scans activeTransactions for footprint
\* conflicts inside the retry-semaphore region before parking — closing
\* the lost-wakeup window. HISTORICAL (pre-fix): this config deadlocked at
\* depth 39 — tr's park landed after tw's submission-time sweep ran
\* against an empty retry map and after tw's commit had already satisfied
\* tr's predicate; nothing ever woke tr (H1, confirmed then fixed).
\* BoundsNeverBind holds here too: the fix eliminates the
\* incarnation-consuming spin, so these verdicts are exhaustive.
CONSTANT
    NoParent = NoParent
    Txns = {"tr", "tw"}
    MaxInc = 2
    MaxVer = 6
    AbortsEnabled = FALSE
SPECIFICATION Spec
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT TallyNonNegative
INVARIANT ContractC
INVARIANT NoDoubleExec
INVARIANT NoExecOnCompleted
INVARIANT CompletionAtMostOnce
INVARIANT NoDoublePublish
INVARIANT NoDroppedSpawn
INVARIANT BoundsNeverBind
